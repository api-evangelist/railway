specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Railway
providerId: railway
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Hosting
description: Railway GraphQL API rate limits per token.
sources:
  - https://railway.com/pricing
  - https://docs.railway.com/reference/public-api
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: GraphQL API
    scope: token
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
  - name: Build concurrency (Hobby)
    scope: team
    metric: concurrent_builds
    limit: 1
  - name: Build concurrency (Pro)
    scope: team
    metric: concurrent_builds
    limit: 5
