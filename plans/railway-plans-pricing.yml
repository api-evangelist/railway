specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Railway
providerId: railway
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Hosting
  - PaaS
description: 'Railway tiers: Free / Hobby / Pro / Enterprise with per-resource billing.'
sources:
  - https://railway.com/pricing
plans:
  - id: railway-free
    name: Free
    type: freemium
    description: $0/mo with $5 trial credits, then $1/mo. Up to 1 vCPU / 0.5 GB RAM per service.
    entries:
      - label: Trial credits
        name: trial
        type: quota
        metric: USD
        limit: 5
        timeFrame: one-time
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: After trial
        name: post_trial
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '1.00'
        userMultiplied: false
    elements:
      - name: 30-day free trial with $5 credits
      - name: Up to 1 vCPU / 0.5 GB RAM per service
      - name: 0.5 GB volume storage
      - name: Community support
  - id: railway-hobby
    name: Hobby
    type: paid
    description: $5 monthly minimum + $5 usage credits.
    entries:
      - label: Monthly minimum
        name: monthly_min
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '5.00'
        userMultiplied: false
      - label: Credits included
        name: credits
        type: quota
        metric: USD
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Up to 48 vCPU / 48 GB RAM per service
      - name: Up to 5 replicas (8 vCPU / 8 GB each)
      - name: Up to 5 GB storage
      - name: 7-day log history
  - id: railway-pro
    name: Pro
    type: paid
    description: $20 monthly minimum + $20 usage credits.
    entries:
      - label: Monthly minimum
        name: monthly_min
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '20.00'
        userMultiplied: false
      - label: Credits included
        name: credits
        type: quota
        metric: USD
        limit: 20
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Up to 1,000 vCPU / 1 TB RAM per service
      - name: Up to 42 replicas
      - name: Up to 1 TB storage
      - name: Unlimited workspace seats
      - name: 30-day log history
      - name: Concurrent global regions
  - id: railway-enterprise
    name: Enterprise
    type: enterprise
    description: Custom pricing.
    entries:
      - label: Annual (custom)
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Up to 2,400 vCPU / 2.4 TB RAM per service
      - name: 90-day log history
      - name: SSO + HIPAA BAAs
      - name: Dedicated VMs + custom infra
  - id: railway-resources
    name: Per-Resource Pricing
    type: metered
    description: Memory $0.00000386/GB-sec, CPU $0.00000772/vCPU-sec, Volumes $0.00000006/GB-sec, Egress
      $0.05/GB.
    entries:
      - label: Memory
        name: memory
        type: metered
        metric: GB-second
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00000386'
        userMultiplied: false
      - label: CPU
        name: cpu
        type: metered
        metric: vCPU-second
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00000772'
        userMultiplied: false
      - label: Volumes
        name: volumes
        type: metered
        metric: GB-second
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00000006'
        userMultiplied: false
      - label: Egress
        name: egress
        type: metered
        metric: GB
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.05'
        userMultiplied: false
    elements:
      - name: Per-second billing
      - name: Sub-cent granularity
